  test_linux:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, ubuntu-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libomp-dev python3-dev
          python3 -m venv Setup/kNNpy_env
          source Setup/kNNpy_env/bin/activate
          pip install --upgrade pip
          pip install -r Setup/requirements_no_Pylians.txt
          pip install "numpy<2.5.0"
          pip install Pylians

      - name: Run tests
        run: |
          source Setup/kNNpy_env/bin/activate
          cd Tests
          parent_path=$(dirname "$PWD")
          export PYTHONPATH="${parent_path}:$PYTHONPATH"   
          python3 import_all_modules.py
          # pytest

      - name: Generate pdoc documentation
        run: |
          source Setup/kNNpy_env/bin/activate
          python3 -m pip install pdoc
          pdoc --math -o pdoc_Documentation -d numpy kNNpy